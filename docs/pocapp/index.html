<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play On Con App</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a1a;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  p {
    color: #cccccc;
    margin-bottom: 32px;
    max-width: 320px;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 320px;
  }
  a.store-button {
    display: block;
    padding: 14px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    color: #ffffff;
  }
  a.apple {
    background: #000000;
    border: 1px solid #444444;
  }
  a.google {
    background: #01875f;
  }
  .spinner {
    margin-bottom: 24px;
  }
</style>
</head>
<body>

  <div id="loading">
    <p class="spinner">Redirecting to your app store...</p>
  </div>

  <div id="fallback" style="display: none;">
    <h1>Play On Con</h1>
    <p>Choose your platform to download the app.</p>
    <div class="buttons">
      <a class="store-button apple" href="https://apps.apple.com/us/app/play-on-con/id6782482020">
        Download for iPhone
      </a>
      <a class="store-button google" href="https://play.google.com/store/apps/details?id=com.fuller.playoncon&pcampaignid=web_share">
        Download for Android
      </a>
    </div>
  </div>

  <script>
    var APPLE_URL = "https://apps.apple.com/us/app/play-on-con/id6782482020";
    var GOOGLE_URL = "https://play.google.com/store/apps/details?id=com.fuller.playoncon&pcampaignid=web_share";

    var ua = navigator.userAgent || navigator.vendor || window.opera;

    function isIOS() {
      return /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    }

    function isAndroid() {
      return /android/i.test(ua);
    }

    if (isIOS()) {
      window.location.replace(APPLE_URL);
    } else if (isAndroid()) {
      window.location.replace(GOOGLE_URL);
    } else {
      document.getElementById("loading").style.display = "none";
      document.getElementById("fallback").style.display = "block";
    }
  </script>

</body>
</html>
